<!DOCTYPE html>
<html>
    <head>
        <title>registration form </title>

    </head>
    <body>
        <h1>Registration Form</h1>
        <div>Fill in the requires fields to create your account</div>
        <p style="border-bottom: 2px solid black; ;">

        <div class="Personal Information">
            <h3>Personal Information</h3>

            <div class="Full name">
                <div>Full Name</div>
               <input type="text" placeholder="Enter your full name" name="Personal Information" required>
               <div>please enter your complete name as per official documents</div>
            </div>

            <div class="Email Address">
                <div>Email Address</div>
                <input type="email" placeholder="example@email.com" name="Email Address" required>
                <div>We will send a verification email to this address</div>
            </div>



            
        </div>
            

    </body>
</html>
